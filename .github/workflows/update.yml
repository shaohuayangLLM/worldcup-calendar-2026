name: Update World Cup Calendar

on:
  schedule:
    - cron: "*/30 * * * *"   # 每 30 分钟刷新比分与淘汰赛对阵
  workflow_dispatch: {}        # 支持网页/CLI 手动触发刷新
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-calendar
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 生成 worldcup.ics
        run: node build.mjs
      - name: 有变更则提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add worldcup.ics
          if git diff --staged --quiet; then
            echo "无变更，跳过提交"
          else
            git commit -m "chore: update calendar $(date -u +%FT%TZ) [skip ci]"
            git push
          fi
